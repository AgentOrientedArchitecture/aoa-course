id: evaluator-query
version: 0.1.0
kind: au
purpose: |
  Rank parsed-note passages against a user question and decide whether the
  note contains enough evidence for a grounded answer.
inputs:
  - name: question
    type: string
    required: true
  - name: parsed_note
    type: structured-note
    required: true
outputs:
  - name: ranked_passages
    type: array
  - name: direct_answer_possible
    type: boolean
  - name: gaps
    type: array
  - name: rationale
    type: string
constraints:
  - The output is a single JSON object.
  - ranked_passages is an array whose items include passage_id, relevance, and reason.
  - relevance values are integers from 1 to 5.
  - gaps is an array of short strings.
evaluation_signals:
  - valid_output_shape
  - has_ranked_passages
  - score_distribution_not_degenerate
  - latency_p95_under(8s)
provenance:
  model: ${MODEL}
