# Course system. Run directly with Docker Compose from the repo root.
#
# Session 2 starts only the CV-fit workflow:
#   docker compose --env-file .env -f system/docker-compose.yml -f system/docker-compose.session2.yml --profile session2 up --build -d
#
# Session 4 starts the full knowledge-management workflow:
#   docker compose --env-file .env -f system/docker-compose.yml --profile session4 up --build -d

services:

  # ------------------------------------------------------------------
  # Services
  # ------------------------------------------------------------------
  registry:
    profiles: ["session2", "session4"]
    build:
      context: ./services/registry
    image: aoa-course/registry:latest
    container_name: aoa-registry
    ports:
      - "7100:7100"
    volumes:
      - registry-data:/data
    environment:
      REGISTRY_DATA_DIR: /data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7100/healthz', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20

  planner:
    profiles: ["session2", "session4"]
    build:
      context: ./services/planner
    image: aoa-course/planner:latest
    container_name: aoa-planner
    ports:
      - "7200:7200"
    volumes:
      - planner-traces:/data/traces
    environment:
      REGISTRY_URL: http://registry:7100
      PLANNER_TRACES_DIR: /data/traces
      PLANNER_INVOKE_TIMEOUT: ${PLANNER_INVOKE_TIMEOUT:-300}
      PLANNER_STRATEGY: ${PLANNER_STRATEGY:-hybrid}
      PLANNER_MODEL_TIMEOUT_SECONDS: ${PLANNER_MODEL_TIMEOUT_SECONDS:-60}
      PLANNER_MODEL_MAX_TOKENS: ${PLANNER_MODEL_MAX_TOKENS:-2048}
      PROVIDER: ${PROVIDER:-ollama}
      MODEL: ${MODEL:-gpt-oss:120b}
      OPENAI_API_KEY: ${AOA_OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      OPENAI_RESPONSE_FORMAT: ${OPENAI_RESPONSE_FORMAT:-json_object}
      OLLAMA_RESPONSE_FORMAT: ${OLLAMA_RESPONSE_FORMAT:-json}
      OLLAMA_THINK: ${OLLAMA_THINK:-false}
    depends_on:
      registry:
        condition: service_healthy

  studio:
    profiles: ["session2", "session4"]
    build:
      context: ./services/studio
    image: aoa-course/studio:latest
    container_name: aoa-studio
    ports:
      - "8080:8080"
    volumes:
      - inbox:/data/inbox
    environment:
      REGISTRY_URL: http://registry:7100
      PLANNER_URL: http://planner:7200
      INBOX_DIR: /data/inbox
      PLANNER_REQUEST_TIMEOUT: ${PLANNER_REQUEST_TIMEOUT:-420}
      STUDIO_WORKFLOWS: ${STUDIO_WORKFLOWS:-cv-fit,knowledge-ingest,wiki-graph,knowledge-query}
    depends_on:
      registry:
        condition: service_healthy
      planner:
        condition: service_started

  # ------------------------------------------------------------------
  # Tools
  # ------------------------------------------------------------------
  tool-filesystem:
    profiles: ["session4"]
    build:
      context: ./tools/filesystem
    image: aoa-course/tool-filesystem:latest
    container_name: aoa-tool-filesystem
    ports:
      - "7401:7401"
    volumes:
      - inbox:/data/inbox:ro
    environment:
      REGISTRY_URL: http://registry:7100
      TOOL_HOST: tool-filesystem
      TOOL_PORT: 7401
      FS_ROOT: /data
    depends_on:
      registry:
        condition: service_healthy

  tool-document-text:
    profiles: ["session2", "session4"]
    build:
      context: ./tools/document-text
    image: aoa-course/tool-document-text:latest
    container_name: aoa-tool-document-text
    ports:
      - "7402:7402"
    volumes:
      - inbox:/data/inbox:ro
    environment:
      REGISTRY_URL: http://registry:7100
      TOOL_HOST: tool-document-text
      TOOL_PORT: 7402
      FS_ROOT: /data
    depends_on:
      registry:
        condition: service_healthy

  tool-wiki-store:
    profiles: ["session4"]
    build:
      context: ./tools/wiki-store
    image: aoa-course/tool-wiki-store:latest
    container_name: aoa-tool-wiki-store
    ports:
      - "7403:7403"
    volumes:
      - wiki-data:/data/wiki
      - inbox:/data/inbox:ro
    environment:
      REGISTRY_URL: http://registry:7100
      TOOL_HOST: tool-wiki-store
      TOOL_PORT: 7403
      FS_ROOT: /data
      WIKI_ROOT: /data/wiki
    depends_on:
      registry:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Agents
  # ------------------------------------------------------------------
  parser:
    profiles: ["session2", "session4"]
    build:
      context: ./agents
      dockerfile: parser/Dockerfile
    image: aoa-course/parser:latest
    container_name: aoa-parser
    ports:
      - "7301:8888"
    volumes:
      # capabilities/ is mounted (not COPYed) so editing skills.md on the
      # host triggers the in-container hot reload.
      - ./agents/parser/capabilities:/app/capabilities:ro
      - inbox:/data/inbox:ro
    environment:
      REGISTRY_URL: http://registry:7100
      PLANNER_URL: http://planner:7200
      AGENT_ID: urn:aoa:agent:parser
      AGENT_NAME: parser
      AGENT_HOST: parser
      AGENT_PORT: 8888
      CAPABILITY_ALLOWLIST: ${PARSER_CAPABILITY_ALLOWLIST:-}
      PROVIDER: ${PROVIDER:-ollama}
      MODEL: ${MODEL:-gpt-oss:120b}
      OPENAI_API_KEY: ${AOA_OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-240}
      MODEL_MAX_TOKENS: ${MODEL_MAX_TOKENS:-8192}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      OPENAI_RESPONSE_FORMAT: ${OPENAI_RESPONSE_FORMAT:-json_object}
      OLLAMA_RESPONSE_FORMAT: ${OLLAMA_RESPONSE_FORMAT:-json}
      OLLAMA_THINK: ${OLLAMA_THINK:-false}
    depends_on:
      registry:
        condition: service_healthy
      tool-document-text:
        condition: service_started

  evaluator:
    profiles: ["session2", "session4"]
    build:
      context: ./agents
      dockerfile: evaluator/Dockerfile
    image: aoa-course/evaluator:latest
    container_name: aoa-evaluator
    ports:
      - "7302:8888"
    volumes:
      - ./agents/evaluator/capabilities:/app/capabilities:ro
      - inbox:/data/inbox:ro
    environment:
      REGISTRY_URL: http://registry:7100
      PLANNER_URL: http://planner:7200
      AGENT_ID: urn:aoa:agent:evaluator
      AGENT_NAME: evaluator
      AGENT_HOST: evaluator
      AGENT_PORT: 8888
      CAPABILITY_ALLOWLIST: ${EVALUATOR_CAPABILITY_ALLOWLIST:-}
      PROVIDER: ${PROVIDER:-ollama}
      MODEL: ${MODEL:-gpt-oss:120b}
      OPENAI_API_KEY: ${AOA_OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-240}
      MODEL_MAX_TOKENS: ${MODEL_MAX_TOKENS:-8192}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      OPENAI_RESPONSE_FORMAT: ${OPENAI_RESPONSE_FORMAT:-json_object}
      OLLAMA_RESPONSE_FORMAT: ${OLLAMA_RESPONSE_FORMAT:-json}
      OLLAMA_THINK: ${OLLAMA_THINK:-false}
    depends_on:
      registry:
        condition: service_healthy
      tool-document-text:
        condition: service_started

  reporter:
    profiles: ["session2", "session4"]
    build:
      context: ./agents
      dockerfile: reporter/Dockerfile
    image: aoa-course/reporter:latest
    container_name: aoa-reporter
    ports:
      - "7303:8888"
    volumes:
      - ./agents/reporter/capabilities:/app/capabilities:ro
    environment:
      REGISTRY_URL: http://registry:7100
      PLANNER_URL: http://planner:7200
      AGENT_ID: urn:aoa:agent:reporter
      AGENT_NAME: reporter
      AGENT_HOST: reporter
      AGENT_PORT: 8888
      CAPABILITY_ALLOWLIST: ${REPORTER_CAPABILITY_ALLOWLIST:-}
      PROVIDER: ${PROVIDER:-ollama}
      MODEL: ${MODEL:-gpt-oss:120b}
      OPENAI_API_KEY: ${AOA_OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-240}
      MODEL_MAX_TOKENS: ${MODEL_MAX_TOKENS:-8192}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      OPENAI_RESPONSE_FORMAT: ${OPENAI_RESPONSE_FORMAT:-json_object}
      OLLAMA_RESPONSE_FORMAT: ${OLLAMA_RESPONSE_FORMAT:-json}
      OLLAMA_THINK: ${OLLAMA_THINK:-false}
    depends_on:
      registry:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Optional: local model server (only started under `local` profile)
  # ------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: aoa-ollama
    profiles: ["local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

volumes:
  registry-data:
  planner-traces:
  inbox:
  ollama-models:
  wiki-data:
