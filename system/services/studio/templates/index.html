<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AOA Studio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>AOA Studio</h1>
    <span id="status" class="status disconnected">connecting…</span>
  </header>

  <main>
    <section id="registry-pane" class="pane">
      <h2>Registry</h2>
      <ul id="registry-list" class="list"></ul>
    </section>

    <section id="trace-pane" class="pane">
      <h2>Intent Studio</h2>
      <div id="intent-form" class="intent">
        <div class="mode-tabs" role="tablist" aria-label="Workflow">
          <button id="mode-cv" class="active" type="button" data-mode="cv-fit">CV fit</button>
          <button id="mode-ingest" type="button" data-mode="knowledge-ingest">Ingest</button>
          <button id="mode-query" type="button" data-mode="knowledge-query">Ask</button>
        </div>

        <div class="workflow-fields" data-mode-panel="cv-fit">
          <label class="drop-field">
            <span class="drop-label">
              <strong>CV</strong>
              <em id="intent-cv-name">paste below or drop a file</em>
            </span>
            <textarea
              id="intent-cv"
              data-name-target="intent-cv-name"
              placeholder="Paste the CV here."
              rows="6"></textarea>
          </label>
          <label class="drop-field">
            <span class="drop-label">
              <strong>Job description</strong>
              <em id="intent-jd-name">paste below or drop a file</em>
            </span>
            <textarea
              id="intent-jd"
              data-name-target="intent-jd-name"
              placeholder="Paste the job description here."
              rows="4"></textarea>
          </label>
        </div>

        <div class="workflow-fields hidden" data-mode-panel="knowledge-ingest">
          <label class="drop-field">
            <span class="drop-label">
              <strong>Source material</strong>
              <em id="intent-note-name">paste below or drop a file</em>
            </span>
            <textarea
              id="intent-note"
              data-name-target="intent-note-name"
              placeholder="Paste a research note, meeting note, article excerpt, or architecture note here."
              rows="7"></textarea>
          </label>
        </div>

        <div class="workflow-fields hidden" data-mode-panel="knowledge-query">
          <label class="drop-field">
            <span class="drop-label">
              <strong>Question</strong>
            </span>
            <textarea
              id="intent-question"
              placeholder="Ask a question the wiki should answer."
              rows="3"></textarea>
          </label>
        </div>

        <div class="intent-actions">
          <button id="intent-submit" type="button">Run cv-fit</button>
          <span id="intent-status"></span>
        </div>
      </div>
      <div id="lifecycle" class="lifecycle">
        <section class="lifecycle-summary">
          <div>
            <span class="section-label">Intent</span>
            <h3 id="intent-title">No run yet</h3>
          </div>
          <span id="run-state" class="run-state idle">idle</span>
        </section>

        <ol id="lifecycle-rail" class="lifecycle-rail"></ol>

        <section class="lifecycle-section">
          <div class="section-head">
            <span class="section-label">Planner</span>
            <span id="planner-source" class="section-meta">waiting</span>
          </div>
          <div id="planner-body" class="planner-body muted-block">No plan yet.</div>
        </section>

        <section class="lifecycle-section">
          <div class="section-head">
            <span class="section-label">Tasks</span>
            <span id="task-count" class="section-meta">0</span>
          </div>
          <ol id="task-list" class="task-list"></ol>
        </section>

        <section class="lifecycle-section result-section">
          <div class="section-head">
            <span class="section-label">Result</span>
            <span id="result-state" class="section-meta">waiting</span>
          </div>
          <div id="result-body" class="result-body muted-block">No result yet.</div>
        </section>
      </div>

      <details class="event-details">
        <summary>Event details</summary>
        <ol id="trace-list" class="list trace"></ol>
      </details>
    </section>

    <section id="card-pane" class="pane">
      <h2>Capability card</h2>
      <pre id="card-body" class="card-body">Click a capability on the left.</pre>
    </section>
  </main>



  <script type="module" src="/static/app.js"></script>
</body>
</html>
